name: Scrape FUTBIN Daily

on:
  schedule:
    # 14:10 Argentina (UTC-3) = 17:10 UTC
    - cron: "10 17 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run scraper (ScraperAPI mode)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: npx tsx scripts/scrape-futbin.ts --bee --rotate --pages 1

      - name: Summary
        if: always()
        run: echo "Scrape completed at $(date -u)"
