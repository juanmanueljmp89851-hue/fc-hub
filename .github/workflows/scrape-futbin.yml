name: Scrape FUTBIN Daily

on:
  schedule:
    # 17:10 UTC = 14:10 Argentina (UTC-3)
    - cron: "10 17 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  trigger-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger scraper on Render
        run: |
          echo "Triggering scrape at $(date -u)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SCRAPE_SECRET }}" \
            "${{ secrets.SCRAPER_URL }}/scrape")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ne 202 ]; then
            echo "Failed to trigger scraper (status $STATUS)"
            exit 1
          fi
          echo "Scraper triggered successfully"
