name: Scrape FUTBIN Daily

on:
  schedule:
    # 14:10 Argentina (UTC-3) = 17:10 UTC
    - cron: "10 17 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Wait for FlareSolverr
        run: |
          echo "Waiting for FlareSolverr to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8191/ > /dev/null 2>&1; then
              echo "FlareSolverr ready!"
              break
            fi
            sleep 2
          done

      - name: Run scraper (FlareSolverr mode)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/scrape-futbin.ts --flare --rotate --pages 1

      - name: Summary
        if: always()
        run: echo "Scrape completed at $(date -u)"
